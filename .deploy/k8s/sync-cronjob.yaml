# In-cluster job-corpus sync — the `SCHEDULER=cron` FALLBACK. POSTs to Hust's sync route (runs in a
# Hust pod → reaches the internal Ever Jobs). SUSPENDED by default because the active scheduler is
# Trigger.dev (its sync-jobs schedule calls the same endpoint, portably). To use this instead of
# Trigger.dev: set SCHEDULER=cron on the app and flip `suspend: false`. Kept (not deleted) for hosts
# where Trigger.dev isn't configured.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hust-jobs-sync
spec:
  suspend: true
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sync
              image: curlimages/curl:8.11.1
              env:
                - name: CRON_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: hust-prod-web-env
                      key: CRON_SECRET
              command:
                - sh
                - -c
                - >-
                  curl -fsS -m 280 -X POST http://hust-prod-web-lb/api/jobs/sync
                  -H "Authorization: Bearer $CRON_SECRET"
                  -H 'Content-Type: application/json'
                  -d '{"resultsWanted":80}'
