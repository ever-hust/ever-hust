name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # DISABLED for now: the Claude Code GitHub App is not installed on this repo,
    # so the action fails on every real PR. Scoped to a `temp` base branch (which
    # no normal PR targets) so it effectively never runs. Re-enable by restoring
    # `branches: [main, develop]` (or removing this filter) once the GitHub App is
    # installed at https://github.com/apps/claude.
    branches: [temp]

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      # Optional: the review runs only when CLAUDE_CODE_OAUTH_TOKEN is set.
      # Without the secret this job no-ops (stays green). Add the secret to enable.
      - name: Check for Claude token
        id: guard
        env:
          CLAUDE_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$CLAUDE_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN not set — skipping Claude review (add the secret to enable)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

