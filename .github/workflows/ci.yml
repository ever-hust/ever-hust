name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Type Check
  # ---------------------------------------------------------------------------
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint

      - name: Build (type check + compile)
        run: pnpm run build
        env:
          # Provide dummy env vars so type generation + build doesn't fail
          DATABASE_URL: "postgresql://localhost:5432/test"
          BETTER_AUTH_SECRET: "test-secret-at-least-32-characters-long"
          BETTER_AUTH_URL: "http://localhost:8443"
          NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-anon-key"
          NEXT_PUBLIC_APP_URL: "http://localhost:8443"
          NEXT_PUBLIC_APP_NAME: "Hust"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          LINKEDIN_CLIENT_ID: "ci-dummy"
          LINKEDIN_CLIENT_SECRET: "ci-dummy"

  # ---------------------------------------------------------------------------
  # Unit Tests
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run unit tests
        run: pnpm test:ci
        env:
          NODE_OPTIONS: "--experimental-vm-modules --max-old-space-size=4096"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # E2E Tests (Playwright)
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: E2E Tests
    runs-on: ${{ vars.RUNNER_LINUX_X64_8 || 'ubuntu-latest' }}
    needs: [lint-typecheck, unit-tests]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hust_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Push database schema
        run: pnpm db:push
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/hust_test"

      - name: Seed database (jobs corpus for authenticated + AI E2E)
        run: pnpm db:seed
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/hust_test"

      - name: Build (production server for E2E)
        run: pnpm build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/hust_test"
          BETTER_AUTH_SECRET: "test-secret-at-least-32-characters-long"
          BETTER_AUTH_URL: "http://localhost:8443"
          NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-anon-key"
          NEXT_PUBLIC_APP_URL: "http://localhost:8443"
          NEXT_PUBLIC_APP_NAME: "Hust"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          LINKEDIN_CLIENT_ID: "ci-dummy"
          LINKEDIN_CLIENT_SECRET: "ci-dummy"

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm exec playwright test
        env:
          CI: true
          PORT: "8443"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/hust_test"
          BETTER_AUTH_SECRET: "test-secret-at-least-32-characters-long"
          BETTER_AUTH_URL: "http://localhost:8443"
          # Real-LLM E2E: set the OPENROUTER_API_KEY repo secret to activate the AI specs.
          # When unset, the AI specs skip gracefully (suite stays green).
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEFAULT_AI_MODEL: "claude-haiku-4-5-20251001"
          NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-anon-key"
          NEXT_PUBLIC_APP_URL: "http://localhost:8443"
          NEXT_PUBLIC_APP_NAME: "Hust"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          LINKEDIN_CLIENT_ID: "ci-dummy"
          LINKEDIN_CLIENT_SECRET: "ci-dummy"
          GITHUB_CLIENT_ID: "ci-dummy"
          GITHUB_CLIENT_SECRET: "ci-dummy"
          GOOGLE_CLIENT_ID: "ci-dummy"
          GOOGLE_CLIENT_SECRET: "ci-dummy"
          FACEBOOK_CLIENT_ID: "ci-dummy"
          FACEBOOK_CLIENT_SECRET: "ci-dummy"
          TWITTER_CLIENT_ID: "ci-dummy"
          TWITTER_CLIENT_SECRET: "ci-dummy"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
