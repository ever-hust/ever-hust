name: Build and Publish Hust Web Image (Dev)

# Builds the Next.js web app container and pushes it to GHCR
# (ghcr.io/ever-hust/hust-web:dev), which the k8s-gauzy cluster pulls for the
# dev environment. Mirrors the stage build but for the `develop` branch — only
# public NEXT_PUBLIC_* are baked in; server secrets are injected by k8s at runtime.
on:
  push:
    branches: [develop]
    paths:
      - "apps/**"
      # The docs site (apps/docs) has its own build+deploy pipeline
      # (docs-build-publish-dev.yml). Exclude it so a docs change never
      # rebuilds/redeploys the web app.
      - "!apps/docs/**"
      - "packages/**"
      - ".deploy/web/**"
      - ".github/workflows/docker-build-publish-dev.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-web:
    runs-on: ${{ vars.RUNNER_LINUX_X64_8 || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Materialise build-time NEXT_PUBLIC_* env
        env:
          HUST_DEV_ENV: ${{ secrets.HUST_DEV_ENV }}
        run: |
          printf '%s' "$HUST_DEV_ENV" > /tmp/hust.env
          # Export only the NEXT_PUBLIC_* lines (the build args Next inlines).
          # HUST_DEV_ENV may be unset/empty — tolerate it (|| true).
          grep -E '^NEXT_PUBLIC_' /tmp/hust.env >> "$GITHUB_ENV" || true
          rm -f /tmp/hust.env

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./.deploy/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/ever-hust/hust-web:dev
            ghcr.io/ever-hust/hust-web:dev-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/ever-hust/hust-web:latest
          cache-to: type=inline
          build-args: |
            NEXT_PUBLIC_APP_URL=https://appdev.hust.so
            NEXT_PUBLIC_DOCS_URL=https://docsdev.hust.so
            NEXT_PUBLIC_MARKETING_URL=https://dev.hust.so
            NEXT_PUBLIC_APP_NAME=${{ env.NEXT_PUBLIC_APP_NAME }}
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ env.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
