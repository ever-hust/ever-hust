name: Deploy Hust Web to DigitalOcean (Prod)

# Deploys the web app to the k8s-gauzy cluster (host: app.hust.so) after the image
# build completes. Uses the cluster kubeconfig directly (HUST_KUBECONFIG secret) —
# no doctl / DO API token needed. Materialises the runtime env + TLS secrets from
# GitHub Actions secrets, applies the manifest, and rolls the deployment.
on:
  workflow_run:
    workflows: ["Build and Publish Hust Web Image (Prod)"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy-web:
    # Prod deploys ONLY from main: the workflow_run `branches: [main]` filter above
    # already restricts the trigger; this guard makes the intent explicit and
    # survives any future change to the build trigger.
    if: ${{ vars.DO_ENABLED == 'true' && (github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')) }}
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure kubeconfig
        env:
          HUST_KUBECONFIG: ${{ secrets.HUST_KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$HUST_KUBECONFIG" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl config use-context do-sfo2-k8s-gauzy

      - name: Materialise runtime env Secret (hust-prod-web-env)
        env:
          HUST_PROD_ENV: ${{ secrets.HUST_PROD_ENV }}
        run: |
          printf '%s' "$HUST_PROD_ENV" > /tmp/hust.env
          kubectl create secret generic hust-prod-web-env \
            --from-env-file=/tmp/hust.env --dry-run=client -o yaml | kubectl apply -f -
          rm -f /tmp/hust.env

      - name: Materialise TLS Secret (app.hust.so-tls)
        env:
          INGRESS_CERT: ${{ secrets.HUST_INGRESS_CERT }}
          INGRESS_CERT_KEY: ${{ secrets.HUST_INGRESS_CERT_KEY }}
        run: |
          if [ -z "$INGRESS_CERT" ]; then
            echo "HUST_INGRESS_CERT not set — skipping TLS secret (ingress will lack a cert until provided)."
            exit 0
          fi
          crt="${HOME}/app.hust.so.crt"; key="${HOME}/app.hust.so.key"
          printf '%s' "$INGRESS_CERT" | base64 --decode > "$crt"
          printf '%s' "$INGRESS_CERT_KEY" | base64 --decode > "$key"
          kubectl create secret tls app.hust.so-tls \
            --cert="$crt" --key="$key" --dry-run=client -o yaml | kubectl apply -f -
          rm -f "$crt" "$key"

      # Apply pending Drizzle migrations to the prod DB BEFORE rolling new pods,
      # so schema changes (e.g. users.is_anonymous) exist when the app boots.
      - name: Set up pnpm
        uses: pnpm/action-setup@v6
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install deps (for migrations)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Ensure anonymous-trial schema column
        env:
          HUST_PROD_ENV: ${{ secrets.HUST_PROD_ENV }}
        run: |
          # The prod DB is drizzle-kit *push*-managed (empty migration journal), so
          # `drizzle-kit migrate` would replay 0000_* against existing tables and fail.
          # Apply just the additive, idempotent column the new code needs.
          db_url=$(printf '%s\n' "$HUST_PROD_ENV" | grep -E '^DATABASE_URL=' | head -1 | cut -d= -f2-)
          db_url="${db_url%\"}"; db_url="${db_url#\"}"; db_url="${db_url%\'}"; db_url="${db_url#\'}"
          if [ -z "$db_url" ]; then
            echo "::error::DATABASE_URL not found in HUST_PROD_ENV" >&2
            exit 1
          fi
          cd packages/db && DATABASE_URL="$db_url" node scripts/ensure-anonymous-column.cjs
          DATABASE_URL="$db_url" node scripts/ensure-credit-tables.cjs
          DATABASE_URL="$db_url" node scripts/ensure-email-tables.cjs

      - name: Apply k8s manifest
        run: kubectl apply -f .deploy/k8s/k8s-manifest.prod.yaml

      - name: Roll the deployment
        run: |
          kubectl rollout restart deployment/hust-prod-web
          kubectl rollout status deployment/hust-prod-web --timeout=240s
