# Ever Hust web app — STAGE manifest for DigitalOcean k8s (do-sfo2-k8s-gauzy).
# Host: stage.hust.so. Lives in its own `hust-stage` namespace on the SAME cluster
# as prod (which runs in `default`) — isolated, single replica, smaller footprint.
#
# Runtime env comes from the Secret `hust-stage-web-env`, (re)created by the stage
# deploy workflow from the HUST_STAGE_ENV GitHub Actions secret — no secret values
# live in this file. Image: ghcr.io/ever-hust/hust-web:stage (built from the `stage` branch).
---
apiVersion: v1
kind: Namespace
metadata:
  name: hust-stage
---
kind: Service
apiVersion: v1
metadata:
  name: hust-stage-web-lb
  namespace: hust-stage
spec:
  type: ClusterIP
  selector:
    app: hust-stage-web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
---
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: hust-stage-web-ingress
  namespace: hust-stage
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "12m"
spec:
  ingressClassName: nginx
  rules:
    - host: stage.hust.so
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hust-stage-web-lb
                port:
                  number: 80
  tls:
    - hosts:
        - stage.hust.so
      secretName: stage.hust.so-tls
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hust-stage-web
  namespace: hust-stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hust-stage-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: hust-stage-web
    spec:
      containers:
        - name: hust-stage-web
          image: ghcr.io/ever-hust/hust-web:stage
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          # Non-secret runtime config; all secrets come from the Secret below.
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          envFrom:
            - secretRef:
                name: hust-stage-web-env
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      # GHCR package ghcr.io/ever-hust/hust-web is public (only NEXT_PUBLIC_* baked in),
      # so no imagePullSecrets needed.
