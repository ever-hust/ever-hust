name: Build and Publish Hust Web Image (Prod)

# Builds the Next.js web app container and pushes it to GHCR
# (ghcr.io/ever-hust/hust-web), which the k8s-gauzy cluster pulls. GHCR uses the
# built-in GITHUB_TOKEN (no extra credentials). The image is safe to publish: only
# public NEXT_PUBLIC_* are baked in; server secrets are injected by k8s at runtime.
# (To switch to the DigitalOcean registry instead, swap the login + tags below and
#  set a registry-scoped DIGITALOCEAN_ACCESS_TOKEN.)
on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      # The docs site (apps/docs) has its own build+deploy pipeline
      # (docs-build-publish-prod.yml). Exclude it so a docs change never
      # rebuilds/redeploys the web app (which would restart app.hust.so).
      - "!apps/docs/**"
      - "packages/**"
      - ".deploy/web/**"
      - ".github/workflows/docker-build-publish-prod.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-web:
    runs-on: ${{ vars.RUNNER_LINUX_X64_8 || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Materialise build-time NEXT_PUBLIC_* env
        env:
          HUST_PROD_ENV: ${{ secrets.HUST_PROD_ENV }}
        run: |
          printf '%s' "$HUST_PROD_ENV" > /tmp/hust.env
          # Export only the NEXT_PUBLIC_* lines (the build args Next inlines).
          grep -E '^NEXT_PUBLIC_' /tmp/hust.env >> "$GITHUB_ENV" || true
          rm -f /tmp/hust.env

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./.deploy/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/ever-hust/hust-web:latest
            ghcr.io/ever-hust/hust-web:prod
            ghcr.io/ever-hust/hust-web:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/ever-hust/hust-web:latest
          cache-to: type=inline
          build-args: |
            NEXT_PUBLIC_APP_URL=https://app.hust.so
            NEXT_PUBLIC_DOCS_URL=https://docs.hust.so
            NEXT_PUBLIC_MARKETING_URL=https://hust.so
            NEXT_PUBLIC_APP_NAME=${{ env.NEXT_PUBLIC_APP_NAME }}
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ env.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            # Error tracking + analytics (public keys, same value across envs).
            NEXT_PUBLIC_SENTRY_DSN=https://e3deaad715f494351a6f377e1d32b1ef@o51327.ingest.us.sentry.io/4511781940035584
            NEXT_PUBLIC_POSTHOG_HOST=https://us.i.posthog.com
            # PostHog project key — sourced from HUST_PROD_ENV (add NEXT_PUBLIC_POSTHOG_KEY=phc_...
            # to that secret once the Ever Hust PostHog project exists). No-op while empty.
            NEXT_PUBLIC_POSTHOG_KEY=${{ env.NEXT_PUBLIC_POSTHOG_KEY }}
