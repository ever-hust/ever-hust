name: Build and Publish Hust Docs Image (Stage)

# Builds the Docusaurus documentation site (docsstage.hust.so) into a static nginx
# image and pushes it to GHCR (ghcr.io/ever-hust/hust-docs:stage), which the
# k8s-gauzy cluster pulls for the stage environment. Self-contained: no server
# secrets, no build args. Triggers ONLY on docs sources — never on app code — so a
# docs change never rebuilds/redeploys the app. Mirrors the prod docs build for the
# `stage` branch.
on:
  push:
    branches: [stage]
    paths:
      - "apps/docs/**"
      - "docs/**"
      - ".deploy/docs/**"
      - ".github/workflows/docs-build-publish-stage.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-docs:
    runs-on: ${{ vars.RUNNER_LINUX_X64_8 || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./.deploy/docs/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/ever-hust/hust-docs:stage
            ghcr.io/ever-hust/hust-docs:stage-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/ever-hust/hust-docs:latest
          cache-to: type=inline
