name: Build and Publish Hust Web Image (Stage)

# Builds the Next.js web app container and pushes it to GHCR
# (ghcr.io/ever-hust/hust-web:stage), which the k8s-gauzy cluster pulls for the
# stage environment. Mirrors the prod build but for the `stage` branch — only
# public NEXT_PUBLIC_* are baked in; server secrets are injected by k8s at runtime.
on:
  push:
    branches: [stage]
    paths:
      - "apps/**"
      - "packages/**"
      - ".deploy/web/**"
      - ".github/workflows/docker-build-publish-stage.yml"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Materialise build-time NEXT_PUBLIC_* env
        env:
          HUST_STAGE_ENV: ${{ secrets.HUST_STAGE_ENV }}
        run: |
          printf '%s' "$HUST_STAGE_ENV" > /tmp/hust.env
          # Export only the NEXT_PUBLIC_* lines (the build args Next inlines).
          grep -E '^NEXT_PUBLIC_' /tmp/hust.env >> "$GITHUB_ENV" || true
          rm -f /tmp/hust.env

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./.deploy/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/ever-hust/hust-web:stage
            ghcr.io/ever-hust/hust-web:stage-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/ever-hust/hust-web:latest
          cache-to: type=inline
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_APP_NAME=${{ env.NEXT_PUBLIC_APP_NAME }}
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ env.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
